<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📤 Document Upload</h1>
            <p class="subtitle">Apni details bharo aur file upload karo</p>

            <form id="form">
                <div class="form-group">
                    <label>👤 Naam *</label>
                    <input type="text" name="userName" required placeholder="Apna naam">
                </div>

                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" name="userEmail" placeholder="email@example.com">
                </div>

                <div class="form-group">
                    <label>📱 Phone</label>
                    <input type="tel" name="userPhone" placeholder="+91 9999999999">
                </div>

                <div class="form-group">
                    <label>📝 Note</label>
                    <textarea name="note" placeholder="Kuch likhna ho..."></textarea>
                </div>

                <div class="form-group">
                    <label>📁 File * (Max 50MB)</label>
                    <div class="drop-zone" id="dropZone">
                        <input type="file" id="fileInp" required hidden>
                        <div class="drop-content">
                            <div class="icon">📁</div>
                            <p id="fileTxt">Click ya Drop karo</p>
                            <p class="filename" id="fileName"></p>
                        </div>
                    </div>
                </div>

                <button type="submit" id="btn" class="btn">🚀 Upload</button>

                <div class="progress" id="prog" style="display:none">
                    <div class="bar" id="bar"></div>
                    <span id="pct">0%</span>
                </div>
            </form>

            <div id="result"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
